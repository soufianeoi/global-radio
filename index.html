<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
  <script type="importmap">
  {
    "imports": {
      "globe.gl": "https://esm.sh/globe.gl@2.32.0"
    }
  }
  </script>
</head>
<body>
  <div id="app">
    <!-- Loading Screen -->
    <div id="loading" class="loading-screen">
      <div class="loading-content">
        <div class="loading-spinner"></div>
        <p class="loading-text">Loading stations…</p>
        <p class="loading-sub">Fetching global radio from radio-browser.info</p>
      </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout" id="main-layout" style="display:none;">
      <!-- Left Panel -->
      <aside class="left-panel">
        <!-- Header / Filters -->
        <div class="panel-header">
          <div class="header-top">
            <h1 class="app-title">Global Radio</h1>
            <span class="station-count" id="station-count">0 stations</span>
          </div>
          <div class="filter-bar">
            <div class="filter-group">
              <select id="country-filter" class="filter-select">
                <option value="">All Countries</option>
              </select>
              <span class="filter-badge" id="country-badge"></span>
            </div>
            <div class="filter-group">
              <select id="genre-filter" class="filter-select">
                <option value="">All Genres</option>
              </select>
              <span class="filter-badge" id="genre-badge"></span>
            </div>
            <button id="favorites-toggle" class="icon-btn" title="Show favorites">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
              </svg>
            </button>
          </div>
        </div>

        <!-- Station Grid -->
        <div class="station-grid" id="station-grid"></div>
      </aside>

      <!-- Right Panel: Globe -->
      <div class="right-panel">
        <div id="globe-container"></div>
        <div class="globe-overlay">
          <div class="globe-hint">
            <span class="kbd">Click</span> a dot to play
          </div>
        </div>
      </div>
    </div>

    <!-- Player Bar -->
    <div class="player-bar" id="player-bar">
      <div class="player-left">
        <button id="play-btn" class="play-btn" disabled>
          <svg id="play-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <polygon points="5 3 19 12 5 21 5 3"></polygon>
          </svg>
          <svg id="pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
            <rect x="6" y="4" width="4" height="16"></rect>
            <rect x="14" y="4" width="4" height="16"></rect>
          </svg>
        </button>
        <div class="player-info">
          <div class="player-name" id="player-name">Select a station</div>
          <div class="player-meta" id="player-meta"></div>
        </div>
      </div>
      <div class="player-center">
        <div class="volume-wrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          </svg>
          <input type="range" id="volume" min="0" max="1" step="0.01" value="0.8" />
        </div>
      </div>
      <div class="player-right">
        <button id="favorite-btn" class="icon-btn" title="Favorite" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
          </svg>
        </button>
        <div class="sleep-wrap">
          <button id="sleep-btn" class="icon-btn" title="Sleep timer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
          </button>
          <div class="sleep-menu" id="sleep-menu">
            <button data-min="15">15 min</button>
            <button data-min="30">30 min</button>
            <button data-min="45">45 min</button>
            <button data-min="60">60 min</button>
            <button data-min="0">Off</button>
          </div>
          <span class="sleep-timer-display" id="sleep-display"></span>
        </div>
      </div>
    </div>

    <!-- Search Modal -->
    <div class="search-modal" id="search-modal">
      <div class="search-backdrop"></div>
      <div class="search-container">
        <div class="search-input-wrap">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="text" id="search-input" placeholder="Search stations, countries, genres…" autocomplete="off" />
          <span class="search-kbd">ESC</span>
        </div>
        <div class="search-results" id="search-results"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
